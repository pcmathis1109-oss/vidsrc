<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VidSRC Protégé</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header>
      <div class="header-badge">VidSRC</div>
      <h1>Accès sécurisé au contenu</h1>
      <p>Entrez le code pour afficher les films, séries et épisodes disponibles.</p>
    </header>

    <main>
      <section id="lock-screen" class="card glass-card">
        <div class="card-title">Connexion requise</div>
        <p class="card-text">Le code d'accès protège l'interface avant la lecture.</p>
        <label for="access-code">Code d'accès</label>
        <input id="access-code" type="password" placeholder="Entrez le code" autocomplete="off" />
        <button id="unlock-button">Déverrouiller</button>
        <p id="lock-message" class="message"></p>
      </section>

      <section id="content-screen" class="card glass-card hidden">
        <div class="card-title">Choix du contenu</div>
        <p class="card-text">Explore les contenus VidSRC via recherche ou listes récentes.</p>

        <div class="controls">
          <div class="control-row">
            <label for="content-type">Mode</label>
            <select id="content-type">
              <option value="search">Recherche (ID ou URL)</option>
              <option value="movies">Films nouveaux</option>
              <option value="tv">Séries nouvelles</option>
              <option value="episodes">Épisodes nouveaux</option>
            </select>
          </div>

          <div id="search-controls" class="control-group">
            <label for="search-query">ID ou URL VidSRC</label>
            <input id="search-query" type="text" placeholder="Ex : 12345 ou https://vidsrc.to/embed/movie/12345" />
            <button id="search-button">Charger</button>
          </div>

          <div id="list-controls" class="control-group hidden">
            <button id="load-list-button">Charger la liste</button>
            <div id="pagination-controls" class="pagination hidden">
              <button id="prev-page">← Précédent</button>
              <span id="page-info">Page 1</span>
              <button id="next-page">Suivant →</button>
            </div>
          </div>
        </div>

        <p id="status-message" class="message"></p>

        <div id="content-list" class="content-list hidden">
          <div id="list-items"></div>
        </div>

        <div id="player-container" class="result hidden"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
